<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conferência de Navios</title>

<style>
body{
    font-family: Arial;
    background:#0d1117;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

input,button{
    padding:10px;
    border:none;
    border-radius:6px;
    margin:5px;
}

input{
    width:250px;
}

button{
    background:#238636;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2ea043;
}

.card{
    background:#161b22;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>
<body>

<h1>Cadastro de Navios</h1>

<div>
    <input id="nomeNavio" placeholder="Nome do navio">
    <input id="statusNavio" placeholder="Status (Em andamento / Fechado)">
    <button onclick="salvarNavio()">Salvar Navio</button>
</div>

<div id="listaNavios"></div>

<script>

// ====== CONFIG JSONBIN ======
const BIN_ID = "69c5f111b7ec241ddca9fc0e";
const API_KEY = "$2a$10$J12q6YYvny40GUwbuIniWOApoV6W.8c7KZ29un0CxrswLgnYP4Hsy";

// ====== CARREGAR NAVIOS ======
async function carregarNavios(){

    const req = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
        headers:{
            "X-Master-Key": API_KEY
        }
    });

    const data = await req.json();

    if(!data.record.navios){
        return;
    }

    mostrarNavios(data.record.navios);
}

// ====== MOSTRAR NA TELA ======
function mostrarNavios(lista){

    const area = document.getElementById("listaNavios");
    area.innerHTML = "";

    lista.forEach(navio => {

        area.innerHTML += `
            <div class="card">
                <b>Navio:</b> ${navio.nome}<br>
                <b>Status:</b> ${navio.status}
            </div>
        `;

    });
}

// ====== SALVAR NAVIO ======
async function salvarNavio(){

    const nome = document.getElementById("nomeNavio").value;
    const status = document.getElementById("statusNavio").value;

    if(nome === "" || status === ""){
        alert("Preencha tudo");
        return;
    }

    // pega dados atuais
    const req = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
        headers:{
            "X-Master-Key": API_KEY
        }
    });

    const data = await req.json();

    let navios = data.record.navios || [];

    // adiciona novo
    navios.push({
        nome:nome,
        status:status,
        criadoEm:new Date().toLocaleString()
    });

    // salva no JSONBIN
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "X-Master-Key": API_KEY
        },
        body: JSON.stringify({
            atualizadoEm:new Date(),
            navios:navios
        })
    });

    // limpa campos
    document.getElementById("nomeNavio").value = "";
    document.getElementById("statusNavio").value = "";

    // atualiza tela
    mostrarNavios(navios);
}

// carrega quando abrir
carregarNavios();

</script>

</body>
</html>
